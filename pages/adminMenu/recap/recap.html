<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Recap</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
	<link rel="stylesheet" href="../base.css">
	<link rel="stylesheet" href="recap.css">
</head>

<body>
	<div class="container">

		<!-- SIDEBAR -->
		<aside class="sidebar">
			<h2 class="logo">Admin</h2>
			<ul>
				<li><a href="../product/product.html">Produit</a></li>
				<li><a href="../menu/menu.html">Menu</a></li>
				<li><a href="../user/user.html">Utilisateur</a></li>
				<li><a href="../recap/recap.html">Récapitulatif</a></li>
			</ul>
		</aside>

		<!-- MAIN -->
		<main class="main-content">

			<header class="top-nav">
				<button id="btn-deconnexion" class="btn btn-cyan">Déconnexion</button>
			</header>

			<div id="modal-logout" class="modal-overlay">
				<div class="modal-content">
					<i class="fa-solid fa-circle-exclamation"
						style="font-size: 3rem; color: var(--pink); margin-bottom: 15px"></i>
					<h2>Se déconnecter ?</h2>
					<p>Voulez-vous vraiment quitter la session en cours ?</p>
					<div class="modal-buttons">
						<button id="confirm-logout" class="btn btn-pink">Oui</button>
						<button id="cancel-logout" class="btn btn-gray">Non</button>
					</div>
				</div>
			</div>
			<section id="recap-section" class="section">
				<h1>Récapitulatif</h1>

				<div class="card table-container">
					<table>
						<thead>
							<tr>
								<th>Produit</th>
								<th>Type</th>
								<th>Prix</th>
								<th>Stock</th>
							</tr>
						</thead>

						<tbody>
							<tr>
								<td>Produit 1</td>
								<td>Cold</td>
								<td>5€</td>
								<td>20</td>
							</tr>
						</tbody>
					</table>
				</div>
			</section>
		</main>

	</div>
	<script type="module" src="recap.js"></script>
</body>

</html>
