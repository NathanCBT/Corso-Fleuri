<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product</title>
    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="product.css" />
  </head>

  <body>
    <div class="container">
      <aside class="sidebar">
        <h2 class="logo">Admin</h2>
        <ul>
          <li><a href="../product/product.html">Produit</a></li>
          <li><a href="../menu/menu.html">Menu</a></li>
          <li><a href="../user/user.html">Utilisateur</a></li>
          <li><a href="../recap/recap.html">Récapitulatif</a></li>
        </ul>
      </aside>

      <main class="main-content">
        <section id="produit-section" class="section">
          <h1>Gestion des Produits</h1>

          <div class="grid-2">
            <div class="card">
              <h3>Ajouter produit</h3>

              <input id="product-name" type="text" placeholder="Nom produit" />
              <input
                id="product-buy-price"
                type="number"
                placeholder="Prix vente"
              />
              <input
                id="product-sell-price"
                type="number"
                placeholder="Prix achat"
              />
              <input
                id="product-quantity"
                type="number"
                placeholder="Quantité"
              />
              <input
                id="product-quantity-limit"
                type="number"
                placeholder="Seuil d'alerte du produit"
              />

              <select id="product-type">
                <option>Type produit</option>
                <option value="cold">Froid</option>
                <option value="hot">Chaud</option>
                <option value="soft">Soft</option>
              </select>

              <input id="product-image" type="file" accept="image/*" />

              <button id="btn-add-product" class="btn primary">Ajouter</button>

              <hr style="margin: 15px 0; border-color: #eee" />
              <h3>Ajouter stock</h3>

              <select id="stock-product-select">
                <option value="">Choisir un produit</option>
              </select>

              <input
                id="stock-quantity-add"
                type="number"
                placeholder="Quantité à ajouter"
              />

              <button id="btn-add-stock" class="btn secondary">Valider</button>
            </div>

            <div class="card">
              <h3>Gérer produit</h3>

              <div class="table-container">
                <table>
                  <thead>
                    <tr>
                      <th>Nom</th>
                      <th>Type</th>
                      <th>Prix</th>
                      <th>Stock</th>
                      <th>Actions</th>
                    </tr>
                  </thead>

                  <tbody id="product-table-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="product.js"></script>
  </body>
</html>
