<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cuisine — Corso Fleuri Donnery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="kitchen.css"/>
</head>
<body>

  <div class="logo">
    <img src="../../assets/logo.png" alt="logo">
  </div>

  <header class="header">
    <h1>Cuisine</h1>
  </header>

  <main class="layout">

    <div class="card">
      <div class="order-num"></div>
      <ul class="plats">
        <li>Menu 1 <span class="qty">×2</span></li>
        <li>Menu 2 <span class="qty">×1</span></li>
        <li>Saucisse <span class="qty">×1</span></li>
      </ul>
    </div>

    <div class="card">
      <div class="order-num"></div>
      <ul class="plats">
        <li>Menu 2 <span class="qty">×1</span></li>
        <li>Frites <span class="qty">×2</span></li>
      </ul>
    </div>

    <div class="ventes-col">
      <div class="historique-card">
        <div class="histo-title">Top des meilleures ventes</div>
        <ul class="histo-list">
          <li class="histo-row rank-1">
            <div class="histo-row-top">
              <div class="histo-name"><span class="rank-badge">1</span> Menu 2</div>
              <span class="histo-total">5</span>
            </div>
            <div class="histo-bar-wrap"><div class="histo-bar" style="width:100%"></div></div>
          </li>
          <li class="histo-row rank-2">
            <div class="histo-row-top">
              <div class="histo-name"><span class="rank-badge">2</span> Frites</div>
              <span class="histo-total">4</span>
            </div>
            <div class="histo-bar-wrap"><div class="histo-bar" style="width:80%"></div></div>
          </li>
          <li class="histo-row rank-3">
            <div class="histo-row-top">
              <div class="histo-name"><span class="rank-badge">3</span> Menu 1</div>
              <span class="histo-total">1</span>
            </div>
            <div class="histo-bar-wrap"><div class="histo-bar" style="width:20%"></div></div>
          </li>
        </ul>
        <div class="histo-footer">
          <span>Total vendus</span>
          <span class="histo-grand-total">16</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="order-num"></div>
      <ul class="plats">
        <li>Saucisses <span class="qty">×2</span></li>
        <li>Frites <span class="qty">×2</span></li>
        <li>Nuggets <span class="qty">×1</span></li>
      </ul>
    </div>

    <div class="card">
      <div class="order-num"></div>
      <ul class="plats">
        <li>Menu 1 <span class="qty">×1</span></li>
        <li>Menu 2 <span class="qty">×3</span></li>
      </ul>
    </div>

  </main>

  <script src="kitchen.js"></script>
</body>
</html>
