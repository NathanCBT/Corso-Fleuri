<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cuisine — Corso Fleuri Donnery</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="kitchen.css"/>
</head>
<body>

  <div class="logo">
    <img src="../../assets/logo.png" alt="logo">
  </div>

  <button id="btn-deconnexion" class="btn btn-cyan btn-deconnexion-fixed">Déconnexion</button>

  <header class="header">
    <h1>Cuisine</h1>
  </header>

  <div id="modal-logout" class="modal-overlay">
      <div class="modal-content">
        <i
          class="fa-solid fa-circle-exclamation"
          style="font-size: 3rem; color: var(--pink); margin-bottom: 15px"
        ></i>
        <h2>Se déconnecter ?</h2>
        <p>Voulez-vous vraiment quitter la session en cours ?</p>
        <div class="modal-buttons">
          <button id="confirm-logout" class="btn btn-pink">Oui</button>
          <button id="cancel-logout" class="btn btn-gray">Non</button>
        </div>
      </div>
    </div>

  <main class="layout" id="orders-layout">
    <p style="text-align:center; grid-column: 1/-1; padding: 40px;">Chargement des commandes...</p>
  </main>
<script src="kitchen.js"></script>
</body>
</html>
