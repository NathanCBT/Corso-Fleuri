<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interface caisse</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-nav">
      <button id="btn-deconnexion" class="btn btn-cyan">Déconnexion</button>
      <button id="btn-menu" class="btn btn-pink-outline">Menu</button>
      <button class="btn btn-blue" id="btn-products">Produits Unitaire</button>
    </header>

    <main class="main-container">
      <aside class="sidebar">
        <h2 class="sidebar-title">Panier</h2>
        <div class="cart-items">
          <div class="cart-card">
            <p class="item-name">Lorem</p>
            <div class="image-placeholder"></div>
            <p class="item-price">12,50 €</p>
            <div class="qty-controls">
              <button class="qty-btn-icon">
                <i class="fa-solid fa-trash-can"></i>
              </button>
              <span class="qty-value">1</span>
              <button class="qty-btn-icon">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
          </div>
          <div class="cart-card">
            <p class="item-name">Lorem</p>
            <div class="image-placeholder"></div>
            <p class="item-price">12,50 €</p>
            <div class="qty-controls">
              <button class="qty-btn-icon">
                <i class="fa-solid fa-trash-can"></i>
              </button>
              <span class="qty-value">1</span>
              <button class="qty-btn-icon">
                <i class="fa-solid fa-plus"></i>
              </button>
            </div>
          </div>
        </div>
      </aside>

      <section id="main-grid" class="products-grid"></section>
    </main>

    <footer class="bottom-bar">
      <button class="btn-commander">Commander</button>
      <div class="total-display">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="total-amount">0,0 €</span>
      </div>
    </footer>

    <div id="modal-logout" class="modal-overlay">
      <div class="modal-content">
        <i
          class="fa-solid fa-circle-exclamation"
          style="font-size: 3rem; color: var(--pink); margin-bottom: 15px"
        ></i>
        <h2>Se déconnecter ?</h2>
        <p>Voulez-vous vraiment quitter la session en cours ?</p>
        <div class="modal-buttons">
          <button id="confirm-logout" class="btn btn-pink">Oui</button>
          <button id="cancel-logout" class="btn btn-gray">Non</button>
        </div>
      </div>
    </div>

    <script src="cashierMenu.js"></script>
  </body>
</html>
